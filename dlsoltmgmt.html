<body>


<div class="main-content">

    <h1 style="display:flex; text-align: center; margin-left: 40%;"> Dhaleswar OLT</h1>
<div>Total Count: <b id="searchcount"></b> </div>
<div style="display: inline-flex; justify-content: space-evenly;" >

<div>

</button>

 </div>

    <table class="table table-bordered" id="onudata-table" style="margin-top: 20px;">
      <thead>
        <tr>
        
          <th>PON</th>
          <th>ONU</th>
          <th>FTTH No/IP Address</th>
          <th>MAC</th>
          <th>Customer</th>
          <th>Address</th>
          <th>Current Status</th>
          <th>Last Synced</th>
          <th>Rx Power(dBm)</th>
          <th>Last Event</th>
          <th>Event Time</th>
          <th style="width:130px;">Action</th>

        </tr>
      </thead>
      <tbody id="onudata-body">
        <!-- Filled by JS -->
      </tbody>
    </table>

</div>
   
    


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
    <script src="https://cdn.rawgit.com/rainabba/jquery-table2excel/1.1.0/dist/jquery.table2excel.min.js"></script>
    <!-- <script src="script.js"></script>
    <script type="module" src="auth-check.js"></script> -->
    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";
//import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
 import { app} from "./firebase-config.js";  

//const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let onulevel = -26;
const dataRef = ref(db, 'dlsoltdata');

let allONUs = {};

onValue(dataRef, (snapshot) => {
    allONUs = snapshot.val() || {};
 
    renderTable();
});


/* ============================= */
/* ===== RENDER TABLE ========= */
/* ============================= */

function normalizePon(value) {
    const str = String(value ?? "").trim();

    if (str.includes("/")) {
        const parts = str.split("/");
        const pon = parseInt(parts[1], 10);   // "0/1" -> 1
        return isNaN(pon) ? 999 : pon;
    }

    const pon = parseInt(str, 10);            // "1" -> 1
    return isNaN(pon) ? 999 : pon;
}

function renderTable() {
    const tbody = document.getElementById("onudata-body");
    const searchcount = document.getElementById("searchcount");

    const searchText = document.getElementById("searchInput").value.toLowerCase().trim();
    const ponInput = document.getElementById("ponSearchInput").value.trim();
    const onuInput = document.getElementById("onuSearchInput").value.trim();
    const onuSearchWrap = document.getElementById("onuSearchWrap");

    tbody.innerHTML = "";
    let filteredData = [];

    const normalizedPonInput = ponInput ? normalizePon(ponInput) : null;

    for (let key in allONUs) {
        const onudata = allONUs[key];

        let rx = parseFloat(onudata.rxpower);
        if (isNaN(rx)) continue;

        if (searchText) {
            const rowText = Object.values(onudata).join(" ").toLowerCase();
            if (!rowText.includes(searchText)) continue;
        }

        if (ponInput) {
            const rowPon = normalizePon(onudata.pon_no);
            if (rowPon !== normalizedPonInput) continue;
        }

        filteredData.push(onudata);
    }

    if (ponInput && filteredData.length > 0) {
        onuSearchWrap.hidden = false;
    } else {
        onuSearchWrap.hidden = true;
        document.getElementById("onuSearchInput").value = "";
    }

    if (!onuSearchWrap.hidden && onuInput) {
        filteredData = filteredData.filter(onudata => {
            return String(onudata.onu_id ?? "").trim() === onuInput;
        });
    }

    filteredData.sort((a, b) => {
        const ponA = normalizePon(a.pon_no);
        const ponB = normalizePon(b.pon_no);

        if (ponA !== ponB) {
            return ponA - ponB;
        }

        let onuA = parseInt(a.onu_id, 10);
        let onuB = parseInt(b.onu_id, 10);

        if (isNaN(onuA)) onuA = 999;
        if (isNaN(onuB)) onuB = 999;

        return onuA - onuB;
    });

    filteredData.forEach(onudata => {
        let rx = parseFloat(onudata.rxpower);
        let rxColor = (!isNaN(rx) && rx <= onulevel) ? "red" : "black";

        let onuStatus = onudata.onustatus || "";
        let onuColor = "black";

        if (onuStatus === "ONLINE") onuColor = "green";
        else if (onuStatus === "LOS/Fibre break") onuColor = "red";

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${onudata.pon_no || ''}</td>
            <td>${onudata.onu_id || ''}</td>
            <td>${onudata.ftthno || ''}</td>
            <td>${onudata.macaddress || ''}</td>
            <td>${onudata.customer || ''}</td>
            <td>${onudata.address || ''}</td>
            <td>${onudata.currentstatus || ''}</td>
            <td>${onudata.synctime || ''}</td>
            <td style="color:${rxColor}; font-weight:bold;">
                ${onudata.rxpower || ''}
            </td>
            <td style="color:${onuColor}; font-weight:bold;">
                ${onuStatus}
            </td>
            <td>${onudata.eventtime || ''}</td>
            <td style="width:130px;">
                <button class="btn btn-info btn-xs edit-btn">Edit</button>
                <button class="btn btn-danger btn-xs delete-btn">Delete</button>
            </td>
        `;

        row.querySelector(".edit-btn").addEventListener("click", () => editPon(onudata));
        row.querySelector(".delete-btn").addEventListener("click", () => deletePon(onudata.key));

        tbody.appendChild(row);
    });

    searchcount.innerText = filteredData.length;
}




  window.editPon = function (onudata) {
    console.log(onudata);
    console.log("Edit clicked", onudata.key);
  Swal.fire({
    title: 'Edit PON',
    width: 500,
    html: `
    <div style="text-align: left; font-size: 12px; width: 100%; display: flex; flex-direction: column; gap: 0;">

      <label><span style="color: red;">Customer: </span>
                <input id="swal_customer" class="swal2-input" value="${onudata.customer}"  style="margin:0;">
            </label>
      
      <label><span style="color: red;">Address: </span>
                <input id="swal_address" class="swal2-input" value="${onudata.address}" style="margin:0;">
            </label>

      <label><span style="color: red;">FTTH No/IP Address: </span>
                <input id="swal_ftthno" class="swal2-input" value="${onudata.ftthno || ''}" style="margin:0;">
            </label>
     
      
      </div>
    
    `,
    showCancelButton: true,
    confirmButtonText: 'Update',
    preConfirm: async () => {
      console.log("Updating", onudata.key);

      const key = onudata.key; // locked
      const customer = document.getElementById('swal_customer').value.trim();
      const address = document.getElementById('swal_address').value.trim();
      const ftthno = String(document.getElementById('swal_ftthno').value.trim());
      
       if (!key) {
        Swal.showValidationMessage('Invalid record key');
        return false;
      }

      if (!customer) {
        Swal.showValidationMessage('Customer Name required');
        return false;
      }

      try {
      //   console.log(update);
      //   console.log(typeof update);
      //   const data = {
      //     customer,
      //     address,
      //     ftthno
      // };

//console.log(JSON.stringify(data));
        await update(ref(db, `gboltdata/${key}`), {
          customer: customer,
	        address: address,
	        ftthno: ftthno
        });
        console.log("Update finished");
        return true;
      } catch (err) {
            console.error("ERROR:", err);
            console.error("STACK:", err.stack);
            Swal.showValidationMessage(err.message);
      }
    }
  }).then((result) => {
    if (result.isConfirmed) {
      Swal.fire("Updated", "PON updated", "success");
      //window.reload();
      //loadStaffList();
    }
  });
};

window.deletePon = async function (key) {
  const confirm = await Swal.fire({
    title: 'Delete?',
    text: `Delete PON ${key}?`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#d33'
  });

  if (!confirm.isConfirmed) return;

  try {
    await set(ref(db, `gboltdata/${key}`), null);
    Swal.fire("Deleted", "PON removed", "success");
    //window.reload();

  } catch (err) {
    Swal.fire("Error", err.message, "error");
  }
};
/* ============================= */
/* ===== SEARCH + FILTER ===== */
/* ============================= */
document.getElementById("searchInput").addEventListener("keyup", function(){
    renderTable();
    
});

document.getElementById("ponSearchInput").addEventListener("input", function () {
    renderTable();
});

document.getElementById("onuSearchInput").addEventListener("input", function () {
    renderTable();
});


/* ============================= */
/* ===== EXPORT TO EXCEL ===== */
/* ============================= */
document.getElementById("exportBtn").addEventListener("click", function () {

    $("#onudata-table").table2excel({
        exclude: ".noExl",
        name: "Dhaleswar OLT Report",
        filename: "DhaleswarOLT_Report",
        fileext: ".xls"
    });

});
/*=====HOME BUTTON=====*/
document.getElementById("home-btn").addEventListener("click", function () {
window.location.href = "alphahome.html";
    
});

    </script>
</body>
