<body>
<div>
       
</div>

<div class="main-content">
    <button class="btn btn-success" id="home-btn"> HOME</button>
    <h1 style="display:flex; text-align: center; margin-left: 40%;"> Dhaleswar OLT</h1>
    <div style="margin:10px 0;">
    <input type="text" id="searchInput" class="form-control"
           placeholder="🔍 Search PON / ONU / MAC / Customer / FTTH..."
           style="max-width:400px;">
</div>
    <table class="table table-bordered" id="onudata-table">
      <thead>
        <tr>
          
          <th>PON</th>
          <th>ONU</th>
          <th>FTTH No/IP Address</th>
          <th>MAC</th>
          <th>Customer</th>
          <th>Address</th>
          <th>Current Status</th>
          <th>Last Synced</th>
          <th>Rx Power(dBm)</th>
          <th>Last Event</th>
          <th>Event Time</th>
          <th style="width:130px;">Action</th>

        </tr>
      </thead>
      <tbody id="onudata-body">
        <!-- Filled by JS -->
      </tbody>
    </table>

</div>
   
    


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
    <script src="https://cdn.rawgit.com/rainabba/jquery-table2excel/1.1.0/dist/jquery.table2excel.min.js"></script>
    <script src="script.js"></script>
    <!-- <script type="module" src="auth-check.js"></script> -->
    <script type="module">

           function getWithExpiry(key) {
    try {
      const itemStr = localStorage.getItem(key);
      if (!itemStr) return null;
      
      const item = JSON.parse(itemStr);
      
     
      if (typeof item === 'string') {
        localStorage.removeItem(key);
        return null;
      }
      
      const now = new Date();
      
      if (now.getTime() > item.expiry) {
        localStorage.removeItem(key);
        return null;
      }
      
      return item.value;
    } catch (error) {
      console.error('Error parsing localStorage data:', error);
      localStorage.removeItem(key); // Clear corrupted data
      return null;
    }
  }

  const currentuser = getWithExpiry("currentuser");

  if (!currentuser) {
    window.location.href = "index.html";
  } else {
    // User is authenticated, continue with your page logic
    console.log("User authenticated:", currentuser);
  }

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";
//import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
 import { app} from "./firebase-config.js";  

//const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

  const dataRef = ref(db, 'dlsoltdata');

  //let orders = [];
   let filteredData = [];
  onValue(dataRef, (snapshot) => {
    filteredData = [];
    const orders = snapshot.val();

    //orders.push(snapshot.val());
    const tbody = document.getElementById("onudata-body");
    tbody.innerHTML = "";

    
    for (let key in orders) {
      const order = orders[key];
      filteredData.push(order);

   /* ---------- RX POWER COLOR ---------- */
  let rx = parseFloat(order.rxpower);
  let rxColor = (!isNaN(rx) && rx <= -26) ? "red" : "black";

  /* ---------- ONU STATUS COLOR ---------- */
  let onuStatus = order.onustatus || "";
  let onuColor = "black";

  if (onuStatus === "ONLINE") {
      onuColor = "green";
  } 
  else if (onuStatus === "LOS/Fibre break") {
      onuColor = "red";
  }

     filteredData.sort((a, b) => {
        let rxA = parseInt(a.onu_id);
        let rxB = parseInt(b.onu_id);

        if (isNaN(rxA)) rxA = 999;
        if (isNaN(rxB)) rxB = 999;

        return rxA - rxB; // lowest first
    });

      
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${order.pon_no || ''}       
            
            </td>

          <td>${order.onu_id || ''}</td>
          <td>${order.ftthno || ''}</td>
          <td>${order.macaddress || ''}</td>
          <td>${order.customer || ''}</td>
          <td>${order.address || ''}</td>
          <td>${order.currentstatus || ''}</td>
          <td>${order.synctime || ''}</td>


           <!-- RX POWER -->
      <td style="color:${rxColor}; font-weight:bold;">
          ${order.rxpower || ''}
      </td>

      <!-- ONU STATUS -->
      <td style="color:${onuColor}; font-weight:bold;">
          ${onuStatus}
      </td>
         
          <td>${order.eventtime || ''}</td>
          <td style="width:130px;">
           <button class="btn btn-info btn-xs edit-btn">Edit</button>
            <button class="btn btn-danger btn-xs delete-btn">Delete</button>
        </td>
        `;

        row.querySelector(".edit-btn").addEventListener("click", () => editPon(order));
      row.querySelector(".delete-btn").addEventListener("click", () => deletePon(order.key));
        tbody.appendChild(row);
         
    

    }
  });

  window.editPon = function (order) {
    console.log(order);
    console.log("Edit clicked", order.key);
  Swal.fire({
    title: 'Edit PON',
    width: 500,
    html: `
    <div style="text-align: left; font-size: 12px; width: 100%; display: flex; flex-direction: column; gap: 0;">

      <label><span style="color: red;">Customer: </span>
                <input id="swal_customer" class="swal2-input" value="${order.customer}"  style="margin:0;">
            </label>
      
      <label><span style="color: red;">Address: </span>
                <input id="swal_address" class="swal2-input" value="${order.address}" style="margin:0;">
            </label>

      <label><span style="color: red;">FTTH No/IP Address: </span>
                <input id="swal_ftthno" class="swal2-input" value="${order.ftthno || ''}" style="margin:0;">
            </label>
     
      
      </div>
    
    `,
    showCancelButton: true,
    confirmButtonText: 'Update',
    preConfirm: async () => {
      console.log("Updating", order.key);

      const key = order.key; // locked
      const customer = document.getElementById('swal_customer').value.trim();
      const address = document.getElementById('swal_address').value.trim();
      const ftthno = String(document.getElementById('swal_ftthno').value.trim());
      
       if (!key) {
        Swal.showValidationMessage('Invalid record key');
        return false;
      }

      if (!customer) {
        Swal.showValidationMessage('Customer Name required');
        return false;
      }

      try {
      //   console.log(update);
      //   console.log(typeof update);
      //   const data = {
      //     customer,
      //     address,
      //     ftthno
      // };

//console.log(JSON.stringify(data));
        await update(ref(db, `dlsoltdata/${key}`), {
          customer: customer,
	        address: address,
	        ftthno: ftthno
        });
        console.log("Update finished");
        return true;
      } catch (err) {
            console.error("ERROR:", err);
            console.error("STACK:", err.stack);
            Swal.showValidationMessage(err.message);
      }
    }
  }).then((result) => {
    if (result.isConfirmed) {
      Swal.fire("Updated", "PON updated", "success");
      //window.reload();
      //loadStaffList();
    }
  });
};

window.deletePon = async function (key) {
  const confirm = await Swal.fire({
    title: 'Delete?',
    text: `Delete PON ${key}?`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#d33'
  });

  if (!confirm.isConfirmed) return;

  try {
    await set(ref(db, `dlsoltdata/${key}`), null);
    Swal.fire("Deleted", "PON removed", "success");
    //window.reload();

  } catch (err) {
    Swal.fire("Error", err.message, "error");
  }
};


document.addEventListener("DOMContentLoaded", function () {

    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {
        const filter = searchInput.value.toLowerCase();
        const rows = document.querySelectorAll("#onudata-body tr");

        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    });

});

/*=====HOME BUTTON=====*/
document.getElementById("home-btn").addEventListener("click", function () {
window.location.href = "alphahome.html";
    
});

    </script>
