let onulevel = -26;
const dataRef = ref(db, 'combinedlowpower');

let allONUs = {};

onValue(dataRef, (snapshot) => {
    allONUs = snapshot.val() || {};
    updateCounts();
    renderTable();
});

/* ============================= */
/* ===== UPDATE OLT COUNTS ===== */
/* ============================= */
function updateCounts() {

    let levelValue = document.getElementById("levelInput").value.trim();
    onulevel = parseFloat(levelValue);

    if (isNaN(onulevel)) {
        onulevel = -26;
    }

    const counts = {};
    let total = 0;

    for (let key in allONUs) {


        const onudata = allONUs[key];
        let rx = parseFloat(onudata.rxpower);

        if (isNaN(rx)) continue;

        // Apply threshold filter
        if (rx > onulevel) continue;

        const olt = onudata.olt || "Unknown";

        counts[olt] = (counts[olt] || 0) + 1;
        total++;
        // const olt = allONUs[key].olt || "Unknown";

        // counts[olt] = (counts[olt] || 0) + 1;
        // total++;



    }

    const select = document.getElementById("oltFilter");

    for (let i = 0; i < select.options.length; i++) {

        let value = select.options[i].value;

        if (value === "All") {
            select.options[i].text = `All OLT (${total})`;
        } else {
            let count = counts[value] || 0;
            select.options[i].text = `${value} (${count})`;
        }
    }
}

/* ============================= */
/* ===== RENDER TABLE ========= */
/* ============================= */
function renderTable() {

    const tbody = document.getElementById("losdata-body");
    const selectedOLT = document.getElementById("oltFilter").value;
    const searchText = document.getElementById("searchInput").value.toLowerCase();

    let levelValue = document.getElementById("levelInput").value.trim();

    // Remove dBm if user types "-26 dBm"
    levelValue = levelValue.replace(/dbm/i, "").trim();

    onulevel = parseFloat(levelValue);

    // If empty or invalid, use default -26
    if (isNaN(onulevel)) {
        onulevel = -26;
    }

    tbody.innerHTML = "";

    let filteredData = [];

    for (let key in allONUs) {

        const onudata = allONUs[key];

        /* OLT FILTER */
        if (selectedOLT !== "All" && onudata.olt !== selectedOLT) continue;

        /* SEARCH FILTER */
        const rowText = Object.values(onudata).join(" ").toLowerCase();
        if (!rowText.includes(searchText)) continue;

        /* LEVEL FILTER */
        let rx = parseFloat(onudata.rxpower);
        if (isNaN(rx)) continue;

        // Only show rows <= threshold
        if (rx > onulevel) continue;

        filteredData.push(onudata);
    }

    /* ============================= */
    /* ===== SORT BY LOWEST RX ===== */
    /* ============================= */
    filteredData.sort((a, b) => {
        let rxA = parseFloat(a.rxpower);
        let rxB = parseFloat(b.rxpower);

        if (isNaN(rxA)) rxA = 999;
        if (isNaN(rxB)) rxB = 999;

        return rxA - rxB; // lowest first
    });

    /* ============================= */
    /* ===== CREATE ROWS ========== */
    /* ============================= */
    filteredData.forEach(onudata => {

        let rx = parseFloat(onudata.rxpower);
        let rxColor = (!isNaN(rx) && rx <= onulevel) ? "red" : "black";

        let onuStatus = onudata.onustatus || "";
        let onuColor = "black";

        if (onuStatus === "ONLINE") onuColor = "green";
        else if (onuStatus === "LOS/Fibre break") onuColor = "red";

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${onudata.olt || ''}</td>
            <td>${onudata.pon_no || ''}</td>
            <td>${onudata.onu_id || ''}</td>
            <td>${onudata.ftthno || ''}</td>
            <td>${onudata.macaddress || ''}</td>
            <td>${onudata.customer || ''}</td>
            <td>${onudata.address || ''}</td>
            <td>${onudata.currentstatus || ''}</td>
            <td>${onudata.synctime || ''}</td>

            <td style="color:${rxColor}; font-weight:bold;">
                ${onudata.rxpower || ''}
            </td>

            <td style="color:${onuColor}; font-weight:bold;">
                ${onuStatus}
            </td>

            <td>${onudata.eventtime || ''}</td>
        `;

        tbody.appendChild(row);
    });
}

/* ============================= */
/* ===== SEARCH + FILTER ===== */
/* ============================= */
document.getElementById("searchInput").addEventListener("keyup", function(){
    renderTable();
