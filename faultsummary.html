function AddDataToTable(workgroup,count){
    
    let trow= document.createElement("tr");
    let td1 = document.createElement('td');
    let td2 = document.createElement('td');
    let td3 = document.createElement('td');
    td1.style.width = "10px";
    td2.style.width = "50px";
    td3.style.width = "10px";
    td1.innerHTML = ++slno;
    td2.innerHTML = workgroup;
   

    // td2.style.cursor = "pointer";
    //         td2.onclick = function(){
    //             FilterbySection(td2.innerText);
    //         }
            

    td3.innerHTML = count;
   


    trow.appendChild(td1);
    trow.appendChild(td2);
    trow.appendChild(td3);
    
   
    tbody1.appendChild(trow);






}
function AddAllItemsToTable(summarylist){
    slno = 0;
    tbody1.innerHTML = "";
    summarylist.forEach(element => {
        AddDataToTable(element.workgroup,element.count);
    });

}


import { getDatabase, ref, child, onValue, get, set,update} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";
const db = getDatabase();


    function GetAllDataOnce(){
    const dbref = ref(db);
    let workgroupCountsArray = [
    { workgroup: "LeasedLine", count: 0 },
    { workgroup: "FinalSubmission", count: 0 },
    { workgroup: "NIB", count: 0 },
    { workgroup: "Tx-West", count: 0 },
    { workgroup: "Tx-North", count: 0 },
    { workgroup: "CNTx-NER", count: 0 },
    { workgroup: "BBM-AGT", count: 0 },
    { workgroup: "BBM-GB", count: 0 },
    { workgroup: "BBM-Sonamura", count: 0 },
    { workgroup: "BBM-Bishalgarh", count: 0 },
    { workgroup: "BBM-Gomati", count: 0 },
    { workgroup: "BBM-South", count: 0 },
    { workgroup: "BBM-Khowai", count: 0 },
    { workgroup: "BBM-Dhalai", count: 0 },
    { workgroup: "BBM-Unakoti", count: 0 },
    { workgroup: "BBM-North", count: 0 },
    { workgroup: "Tx-South", count: 0 },
    {workgroup: "CM-Maintenance", count: 0 },
    {workgroup: "SDE-RKPur", count: 0 },
    {workgroup: "SDE-GB", count: 0 },
    {workgroup: "SDE-Dharmanagar", count: 0 },
    {workgroup: "SDE-External", count: 0 },
    {workgroup: "SDE-Bharatnet", count: 0 },
    ];
    
    get(child(dbref,"lcfaultrecords")).then((snapshot)=>{
        snapshot.forEach(childSnapshot => {
    
        const fault = childSnapshot.val();
       
            
        const section = fault.assignedto_workgroup;
        //console.log(snapshot.val());
        const workgroupObj = workgroupCountsArray.find((item) => item.workgroup === section);
        if (workgroupObj) {
            workgroupObj.count++;
        }

        workgroupCountsArray.sort((b1, b2) => 
            (parseInt(b1.count) < parseInt(b2.count)) ? 1 : (parseInt(b1.count) > parseInt(b2.count)) ? -1 : 0);
        

        AddAllItemsToTable(workgroupCountsArray);
        //searchcount.innerText = slno;
        spinner.stop();
        loaderContainer.style.display = "none";
    });
       
    });

    
}       
window.onload = GetAllDataOnce();

function exportCSVExcel() {
    
   
$('#summarytable').table2excel({
exclude: ".no-export",

fileext: ".xls",
exclude_links: true,
exclude_inputs: true
});
} 

function FilterbySection(section) 
{
    
    const dbref = ref(db);

    get(child(dbref,"lcfaultrecords")).then((snapshot)=>{
        var report=[];
        snapshot.forEach(childSnapshot => {
            const start = new Date(childSnapshot.val().OpenTime);
            const end = new Date();

    // Calculate the difference in milliseconds
    const diffMs = end - start;

            var durationobj = {
                    
                    "PrabalDocketID": childSnapshot.val().PrabalDocketID,
                   "OpenTime":childSnapshot.val().OpenTime,
                    "Customer": childSnapshot.val().Customer,
                    "assignedto_workgroup":childSnapshot.val().assignedto_workgroup,
                              
                    "duration": diffMs};

                 if( durationobj.assignedto_workgroup == section){
            report.push( durationobj);
           
                  }
                  report.sort((b1, b2) => 
            (parseInt(b1.duration) < parseInt(b2.duration)) ? 1 : (parseInt(b1.duration) > parseInt(b2.duration)) ? -1 : 0);
        
      



        });





        AddAllItemsToTable(report);
        searchcount.innerText = slno;
        
    });
        //location.reload();
       
       
   

}
